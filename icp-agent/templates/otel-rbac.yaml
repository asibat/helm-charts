{{- if and .Values.otelCollector.enabled .Values.otelCollector.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "icp-agent.otelServiceAccountName" . }}
  labels:
    {{- include "icp-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
{{- end }}
{{- if and .Values.otelCollector.enabled .Values.otelCollector.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "icp-agent.fullname" . }}-otel
  labels:
    {{- include "icp-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "icp-agent.fullname" . }}-otel
  labels:
    {{- include "icp-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "icp-agent.fullname" . }}-otel
subjects:
  - kind: ServiceAccount
    name: {{ include "icp-agent.otelServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
